name: Deploy to Vercel

# Two supported modes (pick one by adding GitHub secrets):
#
# A) Deploy Hook (simplest — uses the Deploy Hooks section you already see in Vercel)
#    Secret: VERCEL_DEPLOY_HOOK_URL
#    Create at: Project → Settings → Git → Deploy Hooks → branch "main"
#    Then disable duplicate native deploys: Settings → Build and Deployment →
#    Ignored Build Step → exit 0
#
# B) Vercel CLI (needed for PR preview deploys with author override)
#    Secrets: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
#    Optional: VERCEL_DEPLOYER_NAME, VERCEL_DEPLOYER_EMAIL

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment target (CLI mode only)
        required: true
        default: preview
        type: choice
        options:
          - preview
          - production

concurrency:
  group: vercel-deploy-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
  VERCEL_DEPLOYER_NAME: ${{ secrets.VERCEL_DEPLOYER_NAME }}
  VERCEL_DEPLOYER_EMAIL: ${{ secrets.VERCEL_DEPLOYER_EMAIL }}

jobs:
  deploy:
    name: Vercel deploy
    runs-on: ubuntu-latest

    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Resolve deployment target
        id: target
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "environment=production" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.environment }}" = "production" ]; then
            echo "environment=production" >> "$GITHUB_OUTPUT"
          else
            echo "environment=preview" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve deploy mode
        id: mode
        env:
          TARGET_ENV: ${{ steps.target.outputs.environment }}
        run: |
          set -euo pipefail

          has_cli=0
          has_hook=0

          if [ -n "${VERCEL_TOKEN:-}" ] && [ -n "${VERCEL_ORG_ID:-}" ] && [ -n "${VERCEL_PROJECT_ID:-}" ]; then
            has_cli=1
          fi
          if [ -n "${VERCEL_DEPLOY_HOOK_URL:-}" ]; then
            has_hook=1
          fi

          if [ "$TARGET_ENV" != "production" ] && [ "$has_cli" -eq 0 ]; then
            echo "::warning::PR preview deploy needs VERCEL_TOKEN + VERCEL_ORG_ID + VERCEL_PROJECT_ID (deploy hooks only support a fixed branch)."
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "method=none" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$has_cli" -eq 1 ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "method=cli" >> "$GITHUB_OUTPUT"
          elif [ "$has_hook" -eq 1 ] && [ "$TARGET_ENV" = "production" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "method=hook" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::No Vercel secrets configured. Add VERCEL_DEPLOY_HOOK_URL (simple) or VERCEL_TOKEN + ORG_ID + PROJECT_ID (full)."
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "method=none" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger Vercel deploy hook
        if: steps.mode.outputs.ready == 'true' && steps.mode.outputs.method == 'hook'
        run: ./scripts/vercel-trigger-hook.sh

      - name: Check out repository
        if: steps.mode.outputs.ready == 'true' && steps.mode.outputs.method == 'cli'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        if: steps.mode.outputs.ready == 'true' && steps.mode.outputs.method == 'cli'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable pnpm
        if: steps.mode.outputs.ready == 'true' && steps.mode.outputs.method == 'cli'
        run: corepack enable

      - name: Install dependencies
        if: steps.mode.outputs.ready == 'true' && steps.mode.outputs.method == 'cli'
        run: pnpm install --frozen-lockfile

      - name: Rewrite git author for Vercel team check
        if: steps.mode.outputs.ready == 'true' && steps.mode.outputs.method == 'cli'
        env:
          VERCEL_AUTHOR_MODE: range
          BASE_REF: ${{ github.event.pull_request.base.ref || 'main' }}
        run: ./scripts/vercel-git-author.sh

      - name: Install Vercel CLI
        if: steps.mode.outputs.ready == 'true' && steps.mode.outputs.method == 'cli'
        run: npm install -g vercel@latest

      - name: Deploy to Vercel via CLI
        id: deploy
        if: steps.mode.outputs.ready == 'true' && steps.mode.outputs.method == 'cli'
        env:
          VERCEL_ENVIRONMENT: ${{ steps.target.outputs.environment }}
        run: |
          set -euo pipefail
          url="$(./scripts/vercel-deploy.sh "${VERCEL_ENVIRONMENT}")"
          echo "url=${url}" >> "$GITHUB_OUTPUT"
          echo "Deployed to ${url}"

      - name: Comment preview URL on pull request
        if: >-
          steps.mode.outputs.ready == 'true' &&
          steps.mode.outputs.method == 'cli' &&
          steps.target.outputs.environment == 'preview' &&
          github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          DEPLOY_URL: ${{ steps.deploy.outputs.url }}
        run: |
          gh pr comment "$PR_NUMBER" --repo "$REPO" --body \
            "Vercel preview: ${DEPLOY_URL}"
