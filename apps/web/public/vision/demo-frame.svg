<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-label="Demo-Baustellenaufnahme">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8eb4d9"/>
      <stop offset="100%" stop-color="#c9d8e8"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8a7a62"/>
      <stop offset="100%" stop-color="#5f5344"/>
    </linearGradient>
    <pattern id="vlies" width="18" height="18" patternUnits="userSpaceOnUse">
      <rect width="18" height="18" fill="#d8c7a0"/>
      <path d="M0 9 H18 M9 0 V18" stroke="#b79f72" stroke-width="1"/>
    </pattern>
    <pattern id="schicht" width="24" height="12" patternUnits="userSpaceOnUse">
      <rect width="24" height="12" fill="#9aa0a8"/>
      <rect y="5" width="24" height="2" fill="#707780"/>
    </pattern>
  </defs>
  <rect width="1280" height="720" fill="url(#sky)"/>
  <rect y="360" width="1280" height="360" fill="url(#ground)"/>
  <rect x="80" y="220" width="220" height="140" fill="#6f7f92" opacity="0.85"/>
  <rect x="980" y="180" width="180" height="180" fill="#6f7f92" opacity="0.85"/>
  <rect x="102" y="130" width="102" height="34" fill="#10243a" opacity="0.75"/>
  <text x="110" y="152" fill="#f4f7fb" font-family="system-ui,sans-serif" font-size="18">Campus West · Bauabschnitt B</text>
  <!-- Drainagevlies zone (matches stable mock box ~8/18/34/28 %) -->
  <rect x="102" y="130" width="435" height="202" fill="url(#vlies)" stroke="#9a8458" stroke-width="3"/>
  <text x="120" y="170" fill="#4a3f2b" font-family="system-ui,sans-serif" font-size="22" font-weight="600">Drainagevlies GRK 4</text>
  <!-- Sauberkeitsschicht zone (matches stable mock box ~52/42/36/30 %) -->
  <rect x="666" y="302" width="461" height="216" fill="url(#schicht)" stroke="#5f6670" stroke-width="3"/>
  <text x="686" y="342" fill="#1f2430" font-family="system-ui,sans-serif" font-size="22" font-weight="600">Sauberkeitsschicht</text>
  <rect x="0" y="500" width="1280" height="8" fill="#f0c14b"/>
  <text x="24" y="690" fill="#f8fafc" font-family="system-ui,sans-serif" font-size="16" opacity="0.9">Demo-Frame · Mock-Vision ohne Kamera</text>
</svg>
